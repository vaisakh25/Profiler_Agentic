# Non-secret runtime defaults.
# Environment variables in the process or .env override these values.

# Service ports (connection settings)
MCP_PORT: 8080
CONNECTOR_MCP_PORT: 8081
WEB_PORT: 8501
APP_PORT: 8080
GATEWAY_PORT: 9050

# MCP endpoint routing defaults
WEB_MCP_URL: http://localhost:8080/sse
WEB_CONNECTOR_MCP_URL: http://localhost:8081/sse

# Runtime memory tuning (balanced fast profile)
MAX_UPLOAD_SIZE_MB: 500
MAX_PARALLEL_WORKERS: 4
DUCKDB_MEMORY_LIMIT: 1280MB
DUCKDB_THREADS: 4
ENRICHMENT_MAP_WORKERS: 8

# LLM input token limit (prevents context window overflow)
# Set this to stay safely below your model's max input tokens
# Common limits: GPT-3.5=16k, GPT-4=8k/32k/128k, Claude=200k
MAX_INPUT_TOKENS: 8000

# Optional NVIDIA chat tuning
NVIDIA_CHAT_MODEL: mistralai/mistral-large-3-675b-instruct-2512
NVIDIA_REASONING_EFFORT: low
NVIDIA_MAX_TOKENS: 16384
NVIDIA_TOP_P: 1.0

# LLM and MCP timeout tuning (seconds)
LLM_TIMEOUT: 120          # Reduced from 300s (2min faster)
LLM_MAP_TIMEOUT: 60
LLM_REDUCE_TIMEOUT: 180
CHATBOT_LLM_TIMEOUT: 180  # Reduced from 900s (12min faster - aggressive timeout)
MCP_CLIENT_TIMEOUT: 300

# Use optimized system prompt (60% smaller, 5-10x faster response)
USE_OPTIMIZED_PROMPT: true  # Set to false for full detailed prompt

# LangSmith observability defaults (API key in .env)
LANGSMITH_TRACING: true
LANGSMITH_PROJECT: file-profiler
LANGSMITH_ENDPOINT: https://api.smith.langchain.com
LANGSMITH_SAMPLE_RATE: 0.03
LANGSMITH_HIDE_SAMPLE_VALUES: true
LANGSMITH_PROMPTS_ENABLED: false
LANGSMITH_PROMPT_TAG: production

# MinIO runtime defaults (credentials in .env)
MINIO_ENDPOINT_URL: http://localhost:9000
MINIO_BUCKET_NAME: data-files
MINIO_REGION: us-east-1
MINIO_PORT: 9000
MINIO_CONSOLE_PORT: 9001

# OpenAI-compatible endpoint connections (API keys in .env)
NVIDIA_BASE_URL: https://integrate.api.nvidia.com/v1
OPENAI_BASE_URL: https://integrate.api.nvidia.com/v1
OPENAI_API_BASE: https://integrate.api.nvidia.com/v1

# PostgreSQL Profiling defaults (credentials in .env)
PROFILER_PG_PORT: 5432
