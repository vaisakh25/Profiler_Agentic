name: CI Gates

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "main"

jobs:
  deterministic-tests:
    name: Deterministic Test Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov

      - name: Run deterministic suite
        run: |
          pytest --maxfail=1 --ignore=tests/test_deployment_smoke.py

  api-smoke:
    name: API And Smoke Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest pytest-asyncio

      - name: Run deployment smoke and web API integration tests
        run: |
          pytest tests/test_deployment_smoke.py::test_file_profiler_mcp_health tests/test_deployment_smoke.py::test_connector_mcp_health tests/test_web_api_integration.py --maxfail=1

  docker-health:
    name: Docker Health Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest pytest-asyncio

      - name: Build and start compose stack
        run: |
          docker compose up -d --build

      - name: Run docker smoke gate
        env:
          SMOKE_DOCKER_HEALTH_URL: http://127.0.0.1:8080/health
        run: |
          pytest tests/test_deployment_smoke.py::test_docker_compose_health --maxfail=1 --run-docker

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose logs --no-color

      - name: Tear down compose stack
        if: always()
        run: |
          docker compose down --remove-orphans
