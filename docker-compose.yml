services:
  # Single-container Profiler Suite (Profiler MCP + Connector MCP)
  profiler-suite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: profiler-suite
    ports:
      - "8080:8080"
      - "8081:8081"
      - "8501:8501"
    volumes:
      - ./data:/data/mounted:ro           # Read-only mount of local data files
      - profiler-uploads:/data/uploads    # Persistent upload storage
      - profiler-output:/data/output      # Persistent output profiles
    environment:
      - PROFILER_DATA_DIR=/data/mounted
      - PROFILER_UPLOAD_DIR=/data/uploads
      - PROFILER_OUTPUT_DIR=/data/output
      - MAX_UPLOAD_SIZE_MB=500
      - UPLOAD_TTL_HOURS=1
      - MAX_PARALLEL_WORKERS=2
      - DUCKDB_MEMORY_LIMIT=512MB
      - DUCKDB_THREADS=2
      - LOG_LEVEL=INFO
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8080
      - CONNECTOR_MCP_PORT=8081
      - ENABLE_PROFILER_MCP=${ENABLE_PROFILER_MCP:-1}
      - ENABLE_CONNECTOR_MCP=${ENABLE_CONNECTOR_MCP:-1}
      - ENABLE_WEB_UI=${ENABLE_WEB_UI:-0}
      - WEB_PORT=8501
      # LLM provider keys (pass from host .env if needed)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      # Cloud connector credentials (pass from host .env)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - SNOWFLAKE_ACCOUNT=${SNOWFLAKE_ACCOUNT:-}
      - SNOWFLAKE_USER=${SNOWFLAKE_USER:-}
      - SNOWFLAKE_PASSWORD=${SNOWFLAKE_PASSWORD:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; urllib.request.urlopen('http://localhost:8080/health'); os.getenv('ENABLE_CONNECTOR_MCP', '1').strip().lower() not in {'1', 'true', 'yes', 'on'} or urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  profiler-uploads:
  profiler-output:
