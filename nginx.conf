events {
    worker_connections 1024;
}

http {
    upstream file_mcp {
        server mcp-file:8080;  # Docker DNS name
    }
    upstream connector_mcp {
        server mcp-connector:8081;  # Docker DNS name
    }
    upstream web_ui {
        server web:8501;  # Docker DNS name
    }

    # WebSocket upgrade header mapping
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;  # Listen on 80 inside container (mapped to 9050 outside)
        
        # Disable buffering for SSE/streaming
        proxy_buffering off;
        
        # Long timeouts for profiling + LLM calls
        proxy_read_timeout    600s;
        proxy_connect_timeout 15s;
        proxy_send_timeout    600s;
        
        # Common proxy headers
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # File Profiler MCP
        location /mcp/file/ {
            # CRITICAL: Set Host header for FastMCP validation
            proxy_set_header Host "mcp-file:8080";
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            rewrite ^/mcp/file/(.*)$ /$1 break;
            proxy_pass http://file_mcp;
        }

        # Connector MCP
        location /mcp/connector/ {
            # CRITICAL: Set Host header for FastMCP validation
            proxy_set_header Host "mcp-connector:8081";
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            rewrite ^/mcp/connector/(.*)$ /$1 break;
            proxy_pass http://connector_mcp;
        }

        # Unified health check
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Web UI WebSocket endpoint (must be before generic / location)
        location /ws/ {
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_pass http://web_ui;
        }

        # Web UI (default - everything else)
        location / {
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_pass http://web_ui;
        }
    }
}
